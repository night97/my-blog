name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          scp -o StrictHostKeyChecking=no -r . ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/my-blog-deploy
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          set -e
          
          PROJECT_DIR=~/my-blog-deploy
          CONTAINER_NAME="my-blog"

          echo "=== 停止并删除旧容器 ==="
          docker stop $CONTAINER_NAME 2>/dev/null || true
          docker rm $CONTAINER_NAME 2>/dev/null || true

          echo "=== 备份数据 ==="
          if [ -d ~/my-blog/prisma ]; then
            cp -r ~/my-blog/prisma ~/my-blog-deploy/prisma_backup 2>/dev/null || true
          fi

          echo "=== 构建新镜像 ==="
          cd $PROJECT_DIR
          docker build -t my-blog:latest .

          echo "=== 创建数据目录 ==="
          mkdir -p ~/my-blog/prisma
          if [ -d ~/my-blog/prisma_backup ]; then
            cp -r ~/my-blog/prisma_backup/* ~/my-blog/prisma/ 2>/dev/null || true
          fi

          echo "=== 启动新容器 ==="
          docker run -d \
            --name $CONTAINER_NAME \
            -p 80:3000 \
            -v ~/my-blog/prisma:/app/prisma \
            --restart unless-stopped \
            -e NODE_ENV=production \
            -e DATABASE_URL="file:/app/prisma/dev.db" \
            my-blog:latest

          echo "=== 清理构建目录 ==="
          rm -rf ~/my-blog-deploy

          echo "=== 部署完成 ==="
          docker logs $CONTAINER_NAME
          ENDSSH
